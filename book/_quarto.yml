project:
  type: book

book:
  title: "Economic Crises Explained"
  subtitle: "Seventeen Economic Crises from 1720 to Today"
  author: "Algimantas K."
  date: "2026"
  chapters:
    - index.qmd
    - 00-series-framework.qmd
    - ch01-south-sea-bubble.qmd
    - ch02-long-depression.qmd
    - ch03-panic-1907.qmd
    - ch04-weimar-hyperinflation.qmd
    - ch05-great-depression.qmd
    - ch06-stagflation.qmd
    - ch07-latin-american-debt.qmd
    - ch08-black-monday.qmd
    - ch09-japanese-lost-decade.qmd
    - ch10-asian-crisis.qmd
    - ch11-ltcm-collapse.qmd
    - ch12-dotcom-crash.qmd
    - ch13-argentine-crisis.qmd
    - ch14-global-financial-crisis.qmd
    - ch15-eurozone-debt.qmd
    - ch16-covid.qmd
    - ch17-great-inflation.qmd
    - epilogue.qmd
    - references.qmd

bibliography: references.bib

format:
  pdf:
    documentclass: scrreprt
    toc: true
    toc-depth: 2
    number-sections: true
    colorlinks: true
    geometry:
      - top=30mm
      - bottom=30mm
      - left=25mm
      - right=25mm
    linestretch: 1.5
    mainfont: Liberation Sans
    fontsize: 11pt
  html:
    theme:
      - flatly
      - custom.scss
    smooth-scroll: true
    toc: true
    toc-depth: 2
  epub:
    cover-image: cover.png
