name: Render Video

on:
  workflow_dispatch:
    inputs:
      episode:
        description: 'Episode to render (e.g. ep1, or "all" for full series)'
        required: false
        default: 'all'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgles2-mesa-dev \
            libasound2t64 2>/dev/null || \
          sudo apt-get install -y libasound2 || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: video/package-lock.json

      - name: Install Node dependencies
        run: cd video && npm ci

      - name: Download audio assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd video
          gh release download audio-assets --pattern "audio-chunks.tar.gz" --dir /tmp/ 2>/dev/null || echo "No audio-chunks release found, skipping"
          gh release download audio-assets --pattern "bgm.wav" --dir public/audio/ 2>/dev/null || echo "No bgm.wav found, skipping"
          if [ -f /tmp/audio-chunks.tar.gz ]; then
            mkdir -p public/audio/chunks
            tar xzf /tmp/audio-chunks.tar.gz -C public/audio/
          fi

      - name: Render video
        run: |
          cd video
          npx remotion render src/index.ts EconomicsVideo out/EconomicCrises.mp4 \
            --gl=swangle \
            --concurrency=2

      - name: Upload rendered video to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date +%Y%m%d)"
          gh release create "$TAG" \
            --title "Economic Crises Explained — $TAG" \
            --notes "Rendered video build" \
            2>/dev/null || true
          curl -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: video/mp4" \
            --data-binary @video/out/EconomicCrises.mp4 \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$(gh release view "$TAG" --json id -q .id)/assets?name=EconomicCrises.mp4"
